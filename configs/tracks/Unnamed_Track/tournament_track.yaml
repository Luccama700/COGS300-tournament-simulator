# Tournament track — recreated from lab photos
# Origin (0,0) is at the start of the line-following section
# Y axis: negative = forward (into the track)
# All measurements in cm (estimated from photos)
#
# Track sections:
#   1. Line following zigzag (white tape on grey floor)
#   2. Transition zone (tape leads into cardboard maze)
#   3. Cardboard maze - rectangular corridors
#   4. Cardboard maze - spiral curve section
#   5. Decorated corridors (lightning/clouds theme)
#   6. Open rooms with obstacles
#   7. Goal area (Big Ben, weather wall)

track:
  name: "COGS 300 Tournament Track"

  # ══════════════════════════════════════════════════════════════
  # LINE PATHS (white tape on grey floor)
  # The zigzag pattern at the start
  # ══════════════════════════════════════════════════════════════
  line_paths:
    # Starting straight (heading north)
    - x1: 0.0
      y1: 0.0
      x2: 0.0
      y2: -60.0
      width_cm: 2.5

    # Zigzag section (sharp back-and-forth)
    - x1: 0.0
      y1: -60.0
      x2: 35.0
      y2: -90.0
      width_cm: 2.5
    - x1: 35.0
      y1: -90.0
      x2: -35.0
      y2: -120.0
      width_cm: 2.5
    - x1: -35.0
      y1: -120.0
      x2: 35.0
      y2: -150.0
      width_cm: 2.5
    - x1: 35.0
      y1: -150.0
      x2: -35.0
      y2: -180.0
      width_cm: 2.5
    - x1: -35.0
      y1: -180.0
      x2: 35.0
      y2: -210.0
      width_cm: 2.5
    - x1: 35.0
      y1: -210.0
      x2: -35.0
      y2: -240.0
      width_cm: 2.5
    - x1: -35.0
      y1: -240.0
      x2: 35.0
      y2: -270.0
      width_cm: 2.5
    - x1: 35.0
      y1: -270.0
      x2: -35.0
      y2: -300.0
      width_cm: 2.5
    - x1: -35.0
      y1: -300.0
      x2: 0.0
      y2: -330.0
      width_cm: 2.5

    # Line continues into maze entrance area
    - x1: 0.0
      y1: -330.0
      x2: 0.0
      y2: -380.0
      width_cm: 2.5

    # Junction area — line branches
    # Main path goes right toward the maze entrance
    - x1: 0.0
      y1: -380.0
      x2: 60.0
      y2: -380.0
      width_cm: 2.5
    - x1: 60.0
      y1: -380.0
      x2: 60.0
      y2: -430.0
      width_cm: 2.5

    # Left branch (alternate path)
    - x1: 0.0
      y1: -380.0
      x2: -60.0
      y2: -380.0
      width_cm: 2.5
    - x1: -60.0
      y1: -380.0
      x2: -60.0
      y2: -430.0
      width_cm: 2.5

    # Paths converge at maze entrance
    - x1: 60.0
      y1: -430.0
      x2: 0.0
      y2: -430.0
      width_cm: 2.5
    - x1: -60.0
      y1: -430.0
      x2: 0.0
      y2: -430.0
      width_cm: 2.5
    - x1: 0.0
      y1: -430.0
      x2: 0.0
      y2: -460.0
      width_cm: 2.5

  # ══════════════════════════════════════════════════════════════
  # WALLS (cardboard maze)
  # Corridor width is approximately 30-40cm
  # Wall coordinates estimated from aerial photos
  # ══════════════════════════════════════════════════════════════
  walls:
    # --- Maze entrance corridor ---
    # Left wall
    - [-20.0, -460.0, -20.0, -540.0]
    # Right wall
    - [20.0, -460.0, 20.0, -540.0]

    # --- First right turn ---
    - [-20.0, -540.0, -20.0, -560.0]
    - [20.0, -540.0, 80.0, -540.0]
    - [-20.0, -560.0, 80.0, -560.0]
    - [80.0, -540.0, 80.0, -600.0]

    # --- Corridor heading right then down ---
    - [80.0, -560.0, 80.0, -600.0]
    - [80.0, -600.0, 40.0, -600.0]
    - [80.0, -560.0, 140.0, -560.0]
    - [140.0, -560.0, 140.0, -620.0]
    - [40.0, -600.0, 40.0, -660.0]
    - [140.0, -620.0, 80.0, -620.0]
    - [80.0, -620.0, 80.0, -660.0]

    # --- Section with internal obstacle (cardboard barrier) ---
    - [40.0, -660.0, 80.0, -660.0]
    - [60.0, -620.0, 60.0, -640.0]

    # --- Left turn corridor leading to spiral ---
    - [40.0, -660.0, 40.0, -720.0]
    - [80.0, -660.0, 120.0, -660.0]
    - [120.0, -660.0, 120.0, -720.0]
    - [40.0, -720.0, 120.0, -720.0]

    # --- Spiral section (approximated as arcs with line segments) ---
    # Outer spiral wall
    - [120.0, -720.0, 180.0, -720.0]
    - [180.0, -720.0, 220.0, -760.0]
    - [220.0, -760.0, 240.0, -820.0]
    - [240.0, -820.0, 220.0, -880.0]
    - [220.0, -880.0, 180.0, -920.0]
    - [180.0, -920.0, 120.0, -940.0]
    - [120.0, -940.0, 60.0, -920.0]
    - [60.0, -920.0, 30.0, -880.0]
    - [30.0, -880.0, 20.0, -830.0]

    # Inner spiral wall
    - [120.0, -720.0, 120.0, -760.0]
    - [120.0, -760.0, 160.0, -780.0]
    - [160.0, -780.0, 180.0, -820.0]
    - [180.0, -820.0, 170.0, -870.0]
    - [170.0, -870.0, 140.0, -900.0]
    - [140.0, -900.0, 100.0, -910.0]
    - [100.0, -910.0, 70.0, -890.0]
    - [70.0, -890.0, 60.0, -860.0]

    # Center of spiral (small circular obstacle)
    - [120.0, -840.0, 140.0, -830.0]
    - [140.0, -830.0, 150.0, -845.0]
    - [150.0, -845.0, 140.0, -860.0]
    - [140.0, -860.0, 120.0, -855.0]
    - [120.0, -855.0, 115.0, -840.0]
    - [115.0, -840.0, 120.0, -840.0]

    # --- Exit from spiral into decorated corridor ---
    - [20.0, -830.0, 20.0, -780.0]
    - [60.0, -860.0, 60.0, -780.0]
    - [20.0, -780.0, -40.0, -780.0]
    - [60.0, -780.0, 60.0, -740.0]

    # --- Lightning/clouds corridor (heading left) ---
    - [-40.0, -780.0, -40.0, -740.0]
    - [-40.0, -740.0, -160.0, -740.0]
    - [60.0, -740.0, -160.0, -740.0]
    - [-160.0, -740.0, -160.0, -780.0]
    - [-40.0, -780.0, -160.0, -780.0]
    - [-160.0, -780.0, -160.0, -740.0]

    # --- Railroad crossing section ---
    - [-160.0, -740.0, -200.0, -740.0]
    - [-160.0, -780.0, -200.0, -780.0]
    - [-200.0, -740.0, -200.0, -680.0]
    - [-200.0, -780.0, -240.0, -780.0]
    - [-240.0, -780.0, -240.0, -680.0]

    # --- Wide corridor with decorated walls (suns/rainbows) ---
    - [-200.0, -680.0, -200.0, -580.0]
    - [-240.0, -680.0, -240.0, -580.0]
    - [-200.0, -580.0, -140.0, -580.0]
    - [-240.0, -580.0, -300.0, -580.0]

    # --- Open room section ---
    - [-140.0, -580.0, -140.0, -520.0]
    - [-300.0, -580.0, -300.0, -520.0]
    - [-140.0, -520.0, -300.0, -520.0]

    # --- Internal obstacles in open room ---
    - [-200.0, -540.0, -230.0, -540.0]
    - [-230.0, -540.0, -230.0, -560.0]
    - [-170.0, -550.0, -170.0, -570.0]

    # --- Corridor to goal area ---
    - [-300.0, -520.0, -300.0, -460.0]
    - [-140.0, -520.0, -140.0, -460.0]
    - [-300.0, -460.0, -340.0, -460.0]
    - [-140.0, -460.0, -100.0, -460.0]

    # --- Goal room (Big Ben area) ---
    - [-340.0, -460.0, -340.0, -380.0]
    - [-100.0, -460.0, -100.0, -380.0]
    - [-340.0, -380.0, -100.0, -380.0]

    # Obstacles in goal room
    - [-260.0, -420.0, -260.0, -400.0]
    - [-180.0, -440.0, -180.0, -410.0]

  # ══════════════════════════════════════════════════════════════
  # START / GOAL
  # ══════════════════════════════════════════════════════════════
  start:
    x: 0.0
    y: 0.0
    heading: 90.0

  goal:
    x: -220.0
    y: -400.0

  bounds:
    width: 600.0
    height: 1000.0
